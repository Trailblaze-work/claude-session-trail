name: E2E Scheduled (detect Claude Code breaking changes)

on:
  schedule:
    # Once per day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-claude-code

      - name: Install latest Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Log Claude Code version
        run: claude --version

      - name: Run full test suite (unit + E2E)
        run: bash test/run-tests.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
